name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m compileall -q src
      - run: PYTHONPATH=src python -c "import docode; assert docode.__version__ == '0.2.0'"
      - run: PYTHONPATH=src python -m unittest tests.test_architecture_guards

  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: PYTHONPATH=src python -m unittest discover -s tests

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - run: python -m build --wheel

  eval-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: docode eval scaffold .docode/eval-suite --force
      - run: >
          docode eval run tests/fixtures/eval-results
          --report .docode/eval-report.json
          --min-success-rate 0.8
          --max-avg-tool-calls 30
          --max-cost 1.00
