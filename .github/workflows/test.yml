name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - run: python -m build --wheel

  eval-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: docode eval scaffold .docode/eval-suite --force
      - run: >
          docode eval run tests/fixtures/eval-results
          --report .docode/eval-report.json
          --min-success-rate 0.8
          --max-avg-tool-calls 30
          --max-cost 1.00
